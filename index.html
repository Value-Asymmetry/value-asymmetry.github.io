<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Value Asymmetry provides ESG strategy, intelligent automation systems, and real-time reporting dashboards for environmental data.">
    <title>Value Asymmetry | ESG Strategy & Data Automation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- CORE DESIGN VARIABLES --- */
        :root {
            --primary: #0a1a3f;
            --secondary: #294b8a;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #475569;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- GLASSMORPHISM NAVIGATION --- */
        .site-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .site-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        /* --- BANNER --- */
        .hero-banner {
            width: 100%;
            height: auto;
            display: block;
            background: var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* --- TYPOGRAPHY & LAYOUT --- */
        .section {
            max-width: 1000px;
            margin: 100px auto;
            padding: 0 5%;
            scroll-margin-top: 75px;
        }

        .section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .section p {
            line-height: 1.8;
            font-size: 1.15rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 20px;
        }

        /* --- MODERN BULLET POINTS --- */
        .services-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        .services-list li {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 15px;
            padding-left: 30px;
            position: relative;
            font-weight: 400;
        }
